<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Velocity QA/QC — Welding &amp; Inspection Consulting</title>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── FIRM & PROFESSIONAL WHITE/LIGHT CORPORATE THEME ── */
        :root {
            color-scheme: light;
            --bg:      #ffffff;         /* Crisp white primary background */
            --bg2:     #f8fafc;         /* Ultra-light gray for subtle sectioning */
            --surface: #ffffff;         /* Pure white for prominent content cards */
            --s1:      #f1f5f9;         /* Light slate gray for standard rows/pillars */
            --s2:      #e2e8f0;         /* Slightly darker gray for hover depth */
            
            /* Technical & Code Compliance Accents */
            --cyan:    #0f172a;         /* Deep slate/black for primary high-contrast headers */
            --cyan2:   #1e293b;         /* Secondary dark slate text */
            --cyan3:   #334155;         /* Muted technical text */
            --arc:     #0284c7;         /* Controlled engineering blue for highlights */
            --arc2:    #0369a1;         /* Deeper blue highlight */
            --ember:   #b91c1c;         /* Deep crimson for critical stamps/rejections */
            --gold:    #b45309;         /* Authoritative gold for certification badges */
            --teal:    #15803d;         /* Forest green for approved status indicators */
            --red:     #b91c1c;
            --green:   #15803d;
            
            /* Clean System Borders & Grid Lines */
            --dim:     rgba(15,23,42,0.08);   /* Soft subtle tint for container dividers */
            --line:    rgba(15,23,42,0.06);   /* Standard line break grid lines */
            --line2:   rgba(15,23,42,0.12);   /* Firmer border wrapping grids */
            --line3:   rgba(15,23,42,0.25);   /* Strong frame borders */
            --muted:   #475569;         /* Accessible slate-gray for long descriptive copy */
            --text:    #0f172a;         /* Near-black deep slate for maximum readability */
            --cream:   #1e293b;         /* Alternate high-visibility typography color */
            
            /* Typography Stacks */
            --head:    'Barlow Condensed', 'Barlow', sans-serif;
            --mono:    'Share Tech Mono', monospace;
            --serif:   'Barlow', sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--head);
            overflow-x: hidden;
        }

        /* ── ATMOSPHERIC BACKGROUND ──────────────────────────── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--bg);
        }
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg,  rgba(15,23,42,0.015) 0, rgba(15,23,42,0.015) 1px, transparent 1px, transparent 60px),
                repeating-linear-gradient(90deg, rgba(15,23,42,0.015) 0, rgba(15,23,42,0.015) 1px, transparent 1px, transparent 60px);
        }
        .scan {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,.02) 2px, rgba(0,0,0,.02) 4px);
        }

        /* ── PAGE STRUCTURE ──────────────────────────────────── */
        .page {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ══════════════════════════════════════════════════════
           HERO — full-width above the fold
        ══════════════════════════════════════════════════════ */
        .hero {
            display: grid;
            grid-template-columns: 1fr minmax(0,520px) 1fr;
            grid-template-rows: auto;
            align-items: center;
            min-height: 100vh;
            padding: 0 60px;
            gap: 60px;
            position: relative;
        }

        /* ─ hero left ─ */
        .hero-left {
            display: flex;
            flex-direction: column;
            gap: 0;
            align-items: flex-end;
            opacity: 0;
            animation: slideR .9s cubic-bezier(.16,1,.3,1) forwards .3s;
        }
        .hl-eyebrow {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--arc);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hl-eyebrow::before {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: var(--line3);
        }
        .hl-name {
            font-family: var(--serif);
            font-size: clamp(32px,3.5vw,50px);
            font-weight: 300;
            letter-spacing: .08em;
            color: var(--text);
            line-height: 1.1;
            text-align: right;
            margin-bottom: 4px;
        }
        .hl-name strong {
            font-weight: 600;
            color: var(--cream);
        }
        .hl-title {
            font-family: var(--head);
            font-size: clamp(9px,1.1vw,13px);
            font-weight: 400;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: right;
            margin-bottom: 28px;
        }
        .hl-divider {
            width: 60px;
            height: 1px;
            background: var(--line3);
            margin: 0 0 28px auto;
        }
        .hl-credentials {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }
        .hl-cred {
            font-family: var(--mono);
            font-size: 8px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--cyan2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hl-cred-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--ember);
            flex-shrink: 0;
            box-shadow: 0 0 6px rgba(185,28,28,.3);
        }

        /* ─ hero centre / badge ─ */
        .hero-centre {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(.16,1,.3,1) forwards .1s;
        }

        .badge {
            position: relative;
            width: clamp(300px,38vw,480px);
            height: clamp(300px,38vw,480px);
            margin-bottom: 36px;
        }

        .badge-deco {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            border: 1px solid var(--line2);
            animation: spin 80s linear infinite;
        }
        .badge-deco::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            margin-left: -2.5px;
            margin-top: -2.5px;
        }
        .badge-deco::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 50%;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--line3);
            margin-left: -1.5px;
            margin-bottom: -1.5px;
        }

        .badge-conic {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg, rgba(185,28,28,.4) 1.5deg, transparent 5deg,
                transparent 88deg, rgba(2,132,199,.3) 90deg, rgba(2,132,199,.3) 92deg, transparent 96deg,
                transparent 178deg, rgba(185,28,28,.3) 180deg, rgba(185,28,28,.3) 182deg, transparent 186deg,
                transparent 268deg, rgba(180,83,9,.3) 270deg, rgba(180,83,9,.3) 272deg, transparent 276deg,
                transparent 360deg
            );
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
            animation: spin 10s linear infinite;
            filter: blur(.4px);
        }

        .badge-ring1 {
            position: absolute;
            inset: 7px;
            border-radius: 50%;
            border: 1px solid var(--line);
        }
        .badge-ring2 {
            position: absolute;
            inset: 18px;
            border-radius: 50%;
            border: 1px solid var(--line2);
        }

        .badge-circle {
            position: absolute;
            inset: 26px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--line2);
            background: var(--bg2);
            box-shadow: 0 4px 20px rgba(15,23,42,0.05);
        }

        .badge-circle svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .badge-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
            overflow: visible;
        }

        .badge-velocity {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--head);
            font-weight: 700;
            font-size: clamp(26px,7vw,64px);
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--cyan);
            white-space: nowrap;
            z-index: 9;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideR { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: none; } }
        @keyframes slideL { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

        /* ─ hero headline ─ */
        .hero-headline {
            text-align: center;
            margin-bottom: 28px;
        }
        .hh-top {
            font-family: var(--mono);
            font-size: 8px;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--cyan3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .hh-top::before, .hh-top::after {
            content: '';
            display: block;
            width: 30px;
            height: 1px;
            background: var(--line2);
        }
        .hh-main {
            font-family: var(--serif);
            font-size: clamp(14px,2vw,22px);
            font-weight: 300;
            font-style: italic;
            letter-spacing: .06em;
            color: var(--cyan2);
            line-height: 1.4;
        }
        .hh-main strong {
            font-style: normal;
            font-weight: 600;
            color: var(--gold);
        }

        /* ─ hero right ─ */
        .hero-right {
            display: flex;
            flex-direction: column;
            gap: 0;
            align-items: flex-start;
            opacity: 0;
            animation: slideL .9s cubic-bezier(.16,1,.3,1) forwards .3s;
        }
        .hr-eyebrow {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hr-eyebrow::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: var(--line2);
        }
        .hr-tagline {
            font-family: var(--serif);
            font-size: clamp(13px,1.4vw,18px);
            font-weight: 300;
            line-height: 1.8;
            color: var(--cyan2);
            margin-bottom: 28px;
            border-left: 3px solid var(--gold);
            padding-left: 18px;
            font-style: italic;
        }
        .hr-tagline strong {
            font-weight: 600;
            font-style: normal;
            color: var(--text);
        }
        .hr-divider {
            width: 80px;
            height: 1px;
            background: var(--line3);
            margin-bottom: 28px;
        }
        .hr-services {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hr-svc {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .hr-svc-icon {
            width: 32px;
            height: 32px;
            border-radius: 2px;
            flex-shrink: 0;
            background: var(--s1);
            border: 1px solid var(--line3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            margin-top: 1px;
        }
        .hr-svc-name {
            font-family: var(--head);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 3px;
        }
        .hr-svc-desc {
            font-family: var(--mono);
            font-size: 7.5px;
            letter-spacing: .05em;
            color: var(--muted);
            line-height: 1.6;
        }

        /* ─ hero scroll cue ─ */
        .hero-scroll {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeIn .8s ease forwards 1.6s;
        }
        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(180deg, var(--line3), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse { 0%, 100% { opacity: .4 } 50% { opacity: 1 } }
        .scroll-label {
            font-family: var(--mono);
            font-size: 6.5px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ══════════════════════════════════════════════════════
           CONSULTANT VALUE SECTION
        ══════════════════════════════════════════════════════ */
        .value-section {
            padding: 80px 60px;
            border-top: 1px solid var(--dim);
            position: relative;
            opacity: 0;
            animation: fadeIn .8s ease forwards 1.5s;
        }
        .value-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 80px;
            background: linear-gradient(180deg, var(--gold), transparent);
        }
        .vs-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .vs-eyebrow {
            font-family: var(--mono);
            font-size: 7.5px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
        }
        .vs-title {
            font-family: var(--serif);
            font-size: clamp(22px,3vw,38px);
            font-weight: 300;
            letter-spacing: .06em;
            color: var(--text);
            line-height: 1.3;
        }
        .vs-title em {
            font-style: italic;
            color: var(--gold);
        }

        .vs-pillars {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px;
            max-width: 1100px;
            margin: 0 auto;
            background: var(--line2);
            border: 1px solid var(--line3);
        }
        .vs-pillar {
            background: var(--surface);
            padding: 40px 36px;
            position: relative;
            transition: background .3s;
            border-top: 1px solid var(--line3);
        }
        .vs-pillar:hover {
            background: var(--s1);
        }
        .vsp-num {
            font-family: var(--serif);
            font-size: 56px;
            font-weight: 300;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -.02em;
        }
        .vsp-icon {
            font-size: 22px;
            margin-bottom: 16px;
            display: block;
        }
        .vsp-title {
            font-family: var(--head);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .vsp-text {
            font-family: var(--head);
            font-size: 12px;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.8;
        }
        .vsp-text strong {
            color: var(--gold);
            font-weight: 500;
        }

        /* ══════════════════════════════════════════════════════
           PROFILE / RESUME STRIPS
        ══════════════════════════════════════════════════════ */
        .profile-section {
            padding: 80px 60px;
            border-top: 1px solid var(--dim);
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 80px;
            align-items: start;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .ps-eyebrow {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 20px;
        }
        .ps-name {
            font-family: var(--serif);
            font-size: clamp(26px,3vw,42px);
            font-weight: 600;
            letter-spacing: .06em;
            color: var(--text);
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .ps-title {
            font-family: var(--head);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .ps-divider {
            width: 48px;
            height: 1px;
            background: var(--line3);
            margin-bottom: 24px;
        }
        .ps-contact {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 32px;
        }
        .ps-contact-item {
            font-family: var(--mono);
            font-size: 8px;
            letter-spacing: .1em;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ps-contact-item span:first-child {
            color: var(--cyan);
            font-size: 10px;
        }
        .ps-stamps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .ps-stamp {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 6px 10px;
            border: 1px solid var(--line2);
            color: var(--muted);
            background: var(--s1);
            clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
            transition: all .3s;
        }
        .ps-stamp:hover {
            border-color: var(--arc);
            color: var(--arc);
        }

        /* Story / background narrative */
        .ps-story { margin-bottom: 40px; }
        .ps-story-label {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .psl-line {
            flex: 1;
            height: 1px;
            background: var(--line2);
        }
        .ps-story-label span {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--cyan3);
            flex-shrink: 0;
        }
        .ps-story-body {
            border-left: 2px solid var(--line3);
            padding-left: 28px;
        }
        .ps-story-body p {
            font-family: var(--serif);
            font-size: clamp(14px,1.35vw,17px);
            font-weight: 300;
            line-height: 1.95;
            color: var(--muted);
            margin-bottom: 18px;
            letter-spacing: .01em;
        }
        .ps-story-body p:first-child {
            font-size: clamp(16px,1.6vw,20px);
            font-style: italic;
            color: var(--cyan2);
            font-weight: 500;
        }
        .ps-story-body strong {
            font-weight: 600;
            font-style: normal;
            color: var(--text);
        }

        /* Highlights */
        .ps-highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }
        .ps-hl {
            background: var(--surface);
            border: 1px solid var(--line2);
            border-top: 3px solid var(--cyan);
            padding: 18px 18px 16px;
            transition: all .3s;
        }
        .ps-hl:hover {
            border-color: var(--arc);
            background: var(--bg2);
            transform: translateY(-2px);
        }
        .ps-hl-num {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 600;
            color: var(--arc);
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -.01em;
        }
        .ps-hl-label {
            font-family: var(--head);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 6px;
        }
        .ps-hl-desc {
            font-family: var(--mono);
            font-size: 7.5px;
            color: var(--muted);
            line-height: 1.65;
            letter-spacing: .03em;
        }

        /* Career row */
        .ps-career {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 0;
            border: 1px solid var(--line2);
        }
        .ps-job {
            padding: 20px 16px;
            border-right: 1px solid var(--line2);
            position: relative;
            background: var(--surface);
            transition: background .3s;
        }
        .ps-job:last-child { border-right: none; }
        .ps-job:hover { background: var(--s1); }
        .ps-job::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--cyan);
        }
        .ps-period {
            font-family: var(--mono);
            font-size: 7px;
            letter-spacing: .12em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .ps-role {
            font-family: var(--head);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .ps-company {
            font-family: var(--serif);
            font-size: 10px;
            font-style: italic;
            color: var(--arc2);
            margin-bottom: 8px;
        }
        .ps-jdesc {
            font-family: var(--mono);
            font-size: 7px;
            color: var(--muted);
            line-height: 1.65;
            letter-spacing: .03em;
        }

        /* ══════════════════════════════════════════════════════
           SOFTWARE PLATFORM
        ══════════════════════════════════════════════════════ */
        .platform-section {
            padding: 80px 60px;
